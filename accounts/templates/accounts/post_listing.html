{% extends 'accounts/dashboard_base.html' %}

{% block title %}ثبت آگهی جدید{% endblock %}
{% block page_title %}ثبت آگهی جدید{% endblock %}

{% block content %}

<div style="max-width:780px;">
    <div class="dash-card">
        <div class="dash-card-head">
            <h3>➕ اطلاعات آگهی</h3>
        </div>
        <div style="padding:24px;">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-grid" style="margin-bottom:18px;">
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>عنوان آگهی *</label>
                        <input type="text" name="title" placeholder="مثلاً: زمین صنعتی ۵۰۰۰ متری در شهرک کاوه" required>
                    </div>
                    <div class="form-group">
                        <label>دسته‌بندی *</label>
                        <select name="category" required>
                            {% for val, label in categories %}
                            <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>نوع آگهی *</label>
                        <select name="status" required>
                            <option value="sale">فروش</option>
                            <option value="rent">اجاره</option>
                            <option value="buy">خرید</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>قیمت (تومان)</label>
                        <input type="text" name="price" placeholder="مثلاً: 5000000000 (خالی = توافقی)">
                        <span class="form-hint">خالی بگذارید اگر قیمت توافقی است</span>
                    </div>
                    <div class="form-group">
                        <label>مساحت (متر مربع)</label>
                        <input type="number" name="area" placeholder="مثلاً: 5000" step="0.1">
                    </div>
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>موقعیت / آدرس *</label>
                        <input type="text" name="location" placeholder="مثلاً: اراک - شهرک صنعتی کاوه" required>
                    </div>
                    <div class="form-group">
                        <label>تلفن تماس *</label>
                        <input type="text" name="contact" value="{{ profile.phone }}" placeholder="09..." required>
                    </div>
                    <div class="form-group">
                        <label>تصویر آگهی</label>
                        <input type="file" name="image" accept="image/*" style="padding:8px;">
                    </div>
                    <div class="form-group" style="grid-column:1/-1;">
                        <label>توضیحات *</label>
                        <textarea name="description" rows="5" placeholder="توضیحات کامل آگهی را بنویسید..." required></textarea>
                    </div>
                </div>

                <div style="display:flex;gap:12px;align-items:center;">
                    <button type="submit" class="btn-submit">✅ ثبت آگهی</button>
                    <a href="{% url 'my_listings' %}" style="font-size:0.83rem;color:var(--gray-400);">انصراف</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
