<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360">
  <defs>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D6A9F"/>
    </linearGradient>
    <linearGradient id="sky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a7a"/>
      <stop offset="100%" stop-color="#2471B5"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="600" height="360" fill="url(#sky6)"/>
  <!-- Grid lines -->
  <line x1="0" y1="60" x2="600" y2="60" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="180" x2="600" y2="180" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="360" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="360" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="360" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="360" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="500" y1="0" x2="500" y2="360" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Ground -->
  <rect x="0" y="250" width="600" height="110" fill="#1a3a1a" opacity="0.7"/>
  <rect x="0" y="248" width="600" height="6" fill="#2d5a2d" opacity="0.8"/>
  <!-- Road -->
  <polygon points="220,360 380,360 340,250 260,250" fill="#2a2a2a" opacity="0.6"/>
  <rect x="295" y="265" width="10" height="18" fill="white" opacity="0.4" rx="2"/>
  <rect x="295" y="295" width="10" height="18" fill="white" opacity="0.4" rx="2"/>
  <rect x="295" y="325" width="10" height="18" fill="white" opacity="0.4" rx="2"/>
  <!-- Land plots -->
  <rect x="60" y="200" width="100" height="50" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <rect x="180" y="195" width="80" height="55" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <rect x="390" y="200" width="110" height="50" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <rect x="490" y="195" width="70" height="55" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <!-- Pin -->
  <circle cx="300" cy="155" r="22" fill="#FF6B35" opacity="0.95"/>
  <circle cx="300" cy="155" r="10" fill="white" opacity="0.9"/>
  <line x1="300" y1="177" x2="300" y2="200" stroke="#FF6B35" stroke-width="3" opacity="0.9"/>
  <!-- Stars -->
  <circle cx="80" cy="40" r="2" fill="white" opacity="0.5"/>
  <circle cx="160" cy="25" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="450" cy="35" r="2" fill="white" opacity="0.5"/>
  <circle cx="530" cy="18" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="370" cy="55" r="1" fill="white" opacity="0.3"/>
  <!-- Label -->
  <rect x="160" y="300" width="280" height="36" rx="18" fill="rgba(0,0,0,0.35)"/>
  <text x="300" y="323" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white" opacity="0.9">زمین صنعتی</text>
</svg>